<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heroe-Registrar</title>
    <!-- referenciar fuente google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div class="top-bar">Descuentos 20%</div>
      <h2>DC Heroes</h2>
      <div class="con-reg-ing">
        <a href="./index.html">Home</a>
        <a href="./Contacto">Contacto</a>
        <a href="./registrar.html">Registrarme</a>
        <a href="./ingresar.html">Ingresar</a>
      </div>
    </header>
    <main>
        <div class="form-contenedor">
            <form action="./ingresar.html" method="post">
                <p>Registrar cuenta </p>
                <div>
                   <label for="usuario"> ingrese usuario</label>
                   <input type="text" name="usuario" required>
                </div>
                <p>
                   <label for="email">Ingrese email</label>
           <input type="email" name="email" id="email" required>
                </p>
                <p>
                    <label for="email2">ingrese email neuvamente</label>
                    <input type="email" name="email2" id="email2" placeholder="tu@email.com" required>
                </p>
                <p>
                    <label for="contrasenia">Ingrese contraseña</label>
                    <input type="password" name="contrasenia" id="contrasenia" required>
                </p>
                <p>
                    <label for="contrasenia2">Ingrese nuevamente la contraseña</label>
                    <input type="password" name="contrasenia2" id="contrasenia2" required>
                </p>
                <hr>
             <button type="submit">Registrar </button>
            </form>
           

        </div>
 
    </main>
    <footer>
      <p>Todos los derechos reservados - Marco Castillo Cabrera</p>

      <div class="git">
        <h2>GitHub</h2>
      </div>
    </footer>
  </body>
</html>
